<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Masa Dorada - Sistema de Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-amber-50 min-h-screen p-4 md:p-8 font-sans">

    <div class="max-w-lg mx-auto bg-white rounded-2xl shadow-xl overflow-hidden p-8 border-t-4 border-amber-600">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-amber-900 mb-2">🍞 La Masa Dorada</h1>
            <p class="text-amber-700 font-medium">Registro de Nuevos Productos</p>
        </div>

        <form id="formularioPanaderia" class="space-y-5">
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Nombre del producto *</label>
                <input type="text" id="nombre" required class="w-full rounded-lg border-gray-300 bg-gray-50 p-2.5 border focus:ring-2 focus:ring-amber-500 focus:border-amber-500 transition-colors" placeholder="Ej. Concha de Vainilla">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Descripción</label>
                <textarea id="descripcion" rows="2" class="w-full rounded-lg border-gray-300 bg-gray-50 p-2.5 border focus:ring-2 focus:ring-amber-500 focus:border-amber-500 transition-colors" placeholder="Ej. Pan dulce tradicional con costra de azúcar..."></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Precio ($) *</label>
                    <input type="number" step="0.50" id="precio" required class="w-full rounded-lg border-gray-300 bg-gray-50 p-2.5 border focus:ring-2 focus:ring-amber-500 focus:border-amber-500 transition-colors" placeholder="0.00">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Stock inicial *</label>
                    <input type="number" id="stock" required class="w-full rounded-lg border-gray-300 bg-gray-50 p-2.5 border focus:ring-2 focus:ring-amber-500 focus:border-amber-500 transition-colors" placeholder="Cant. en vitrina" value="0">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Categoría *</label>
                <select id="categoria" required class="w-full rounded-lg border-gray-300 bg-gray-50 p-2.5 border focus:ring-2 focus:ring-amber-500 focus:border-amber-500 transition-colors">
                    <option value="" disabled selected>Selecciona una opción...</option>
                    <option value="pan_dulce">Pan Dulce</option>
                    <option value="pan_salado">Pan Salado</option>
                    <option value="reposteria">Repostería</option>
                    <option value="bebida">Bebidas calientes/frías</option>
                </select>
            </div>

            <button type="submit" class="w-full mt-4 flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-base font-bold text-white bg-amber-600 hover:bg-amber-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-amber-600 transition-all transform hover:scale-[1.02]">
                Guardar Producto en Supabase
            </button>
        </form>

        <div id="mensaje" class="mt-6 text-center text-sm font-bold p-3 rounded-lg hidden transition-all"></div>
    </div>

    <script>
        // ==========================================
        // 1. CONFIGURACIÓN DE SUPABASE
        // ==========================================
        // REEMPLAZA ESTO CON LOS DATOS DE TU PROYECTO
        const SUPABASE_URL = 'https://TU-PROYECTO.supabase.co';
        const SUPABASE_ANON_KEY = 'TU-LLAVE-ANONIMA-PUBLICA'; 

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ==========================================
        // 2. LÓGICA DEL FORMULARIO
        // ==========================================
        const formulario = document.getElementById('formularioPanaderia');
        const divMensaje = document.getElementById('mensaje');

        formulario.addEventListener('submit', async function(event) {
            event.preventDefault(); 
            
            const btnSubmit = formulario.querySelector('button[type="submit"]');
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = 'Guardando...';

            // Recolectar datos
            const datosProducto = {
                nombre: document.getElementById('nombre').value,
                descripcion: document.getElementById('descripcion').value,
                precio: parseFloat(document.getElementById('precio').value),
                stock: parseInt(document.getElementById('stock').value),
                categoria: document.getElementById('categoria').value
            };

            mostrarMensaje("⏳ Conectando con la base de datos...", "bg-blue-100 text-blue-800");

            // Insertar en Supabase
            const { data, error } = await supabase
                .from('productos_panaderia')
                .insert([datosProducto]);

            // Manejo de respuesta
            if (error) {
                console.error("Error Supabase:", error);
                mostrarMensaje("❌ Error: " + error.message, "bg-red-100 text-red-800");
            } else {
                mostrarMensaje("✅ ¡Producto registrado con éxito!", "bg-green-100 text-green-800");
                formulario.reset(); 
            }

            btnSubmit.disabled = false;
            btnSubmit.innerHTML = 'Guardar Producto en Supabase';
        });

        function mostrarMensaje(texto, clasesCSS) {
            divMensaje.textContent = texto;
            divMensaje.className = `mt-6 text-center text-sm font-bold p-3 rounded-lg ${clasesCSS}`;
        }
    </script>
</body>
</html>
