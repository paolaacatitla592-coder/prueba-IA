<script>
    // Variable con nombre distinto para no chocar con la librería
    let sbClient; 

    async function conectarSupabase() {
        try {
            // 1. Pedimos las llaves al servidor
            const response = await fetch('/config');
            const config = await response.json();
            
            // 2. Inicializamos usando la librería 'supabase' (global) 
            // y guardamos la instancia en 'sbClient'
            sbClient = supabase.createClient(config.url, config.key);
            
            document.getElementById('status').textContent = "✅ Conectado a Supabase";
            document.getElementById('status').className = "mt-4 text-center text-green-600";
        } catch (error) {
            console.error("Error:", error);
            document.getElementById('status').textContent = "❌ Error al conectar";
        }
    }

    document.getElementById('formPan').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Usamos 'sbClient' aquí abajo
        if (!sbClient) return alert("Conectando...");

        const { error } = await sbClient.from('productos_panaderia').insert([{
            nombre: document.getElementById('nombre').value,
            precio: document.getElementById('precio').value
        }]);

        if (error) {
            alert("Error: " + error.message);
        } else {
            alert("¡Guardado!");
            document.getElementById('formPan').reset();
        }
    });

    conectarSupabase();
</script>
