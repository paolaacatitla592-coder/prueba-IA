<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>La Masa Dorada - Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-amber-50 p-8">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-md border border-amber-200">
        <h1 class="text-2xl font-bold text-center text-amber-800 mb-4">🍞 La Masa Dorada</h1>
        
        <form id="formPan" class="space-y-4">
            <input type="text" id="nombre" placeholder="Nombre producto" required class="w-full p-2 border rounded">
            
            <input type="number" id="precio" step="0.50" placeholder="Precio" required class="w-full p-2 border rounded">
            
            <select id="categoria" required class="w-full p-2 border rounded">
                <option value="" disabled selected>Selecciona una categoría</option>
                <option value="pan_dulce">Pan Dulce</option>
                <option value="pan_salado">Pan Salado</option>
                <option value="reposteria">Repostería</option>
            </select>
            
            <button type="submit" class="w-full bg-amber-600 text-white p-2 rounded font-bold hover:bg-amber-700 transition">Guardar</button>
        </form>
        
        <div id="status" class="mt-4 text-center font-bold text-gray-600">Conectando...</div>
    </div>

<script>
    let sbClient; 

    async function conectarSupabase() {
        const RENDER_URL = 'https://tu-servicio.onrender.com'; // Asegúrate de cambiar esto
        try {
            const response = await fetch(`${RENDER_URL}/config`);
            const config = await response.json();
            sbClient = supabase.createClient(config.url, config.key);
            document.getElementById('status').textContent = "✅ Conectado";
            document.getElementById('status').className = "mt-4 text-center text-green-600";
        } catch (error) {
            document.getElementById('status').textContent = "❌ Error al conectar";
        }
    }

    document.getElementById('formPan').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!sbClient) return alert("Esperando conexión...");

        // Obtenemos los valores incluyendo el nuevo campo categoria
        const nombre = document.getElementById('nombre').value;
        const precio = parseFloat(document.getElementById('precio').value);
        const categoria = document.getElementById('categoria').value;

        // Enviamos a Supabase
        const { error } = await sbClient.from('productos_panaderia').insert([{
            nombre: nombre,
            precio: precio,
            categoria: categoria // Aseguramos que se envíe este campo
        }]);

        if (error) {
            alert("Error al guardar: " + error.message);
        } else {
            alert("¡Producto guardado exitosamente!");
            document.getElementById('formPan').reset();
        }
    });

    conectarSupabase();
</script>
</body>
</html>
