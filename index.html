<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>La Masa Dorada - Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-amber-50 p-8">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold text-center text-amber-800 mb-4">🍞 La Masa Dorada</h1>
        <form id="formPan" class="space-y-3">
            <input type="text" id="nombre" placeholder="Nombre producto" required class="w-full p-2 border rounded">
            <input type="number" id="precio" placeholder="Precio" required class="w-full p-2 border rounded">
            <button type="submit" class="w-full bg-amber-600 text-white p-2 rounded font-bold">Guardar</button>
        </form>
        <div id="status" class="mt-4 text-center font-bold">Cargando conexión...</div>
    </div>
<script>
    // Variable con nombre distinto para no chocar con la librería
    let sbClient; 

    async function conectarSupabase() {
        try {
            // 1. Pedimos las llaves al servidor
            const response = await fetch('/config');
            const config = await response.json();
            
            // 2. Inicializamos usando la librería 'supabase' (global) 
            // y guardamos la instancia en 'sbClient'
            sbClient = supabase.createClient(config.url, config.key);
            
            document.getElementById('status').textContent = "✅ Conectado a Supabase";
            document.getElementById('status').className = "mt-4 text-center text-green-600";
        } catch (error) {
            console.error("Error:", error);
            document.getElementById('status').textContent = "❌ Error al conectar";
        }
    }

    document.getElementById('formPan').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Usamos 'sbClient' aquí abajo
        if (!sbClient) return alert("Conectando...");

        const { error } = await sbClient.from('productos_panaderia').insert([{
            nombre: document.getElementById('nombre').value,
            precio: document.getElementById('precio').value
        }]);

        if (error) {
            alert("Error: " + error.message);
        } else {
            alert("¡Guardado!");
            document.getElementById('formPan').reset();
        }
    });

    conectarSupabase();
</script>
</body>
</html>
